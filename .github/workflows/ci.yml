name: Playwright QA Automation

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TESTRAIL_HOST: ${{ secrets.TESTRAIL_HOST }}
      TESTRAIL_PROJECT_NAME: ${{ secrets.TESTRAIL_PROJECT_NAME }}
      TESTRAIL_USERNAME: ${{ secrets.TESTRAIL_USERNAME }}
      TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
      TESTRAIL_SUITE_ID: ${{ secrets.TESTRAIL_SUITE_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python for TestRail CLI
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright suite
        run: npm run test:ci
        env:
          TESTRAIL_ENABLED: 'false'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload raw test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Install TestRail CLI
        if: always() && env.TESTRAIL_HOST != '' && env.TESTRAIL_PROJECT_NAME != '' && env.TESTRAIL_USERNAME != '' && env.TESTRAIL_API_KEY != '' && env.TESTRAIL_SUITE_ID != ''
        run: pip install trcli

      - name: Upload JUnit results to TestRail
        if: always() && env.TESTRAIL_HOST != '' && env.TESTRAIL_PROJECT_NAME != '' && env.TESTRAIL_USERNAME != '' && env.TESTRAIL_API_KEY != '' && env.TESTRAIL_SUITE_ID != ''
        run: >-
          trcli -y
          -h "${{ env.TESTRAIL_HOST }}"
          --project "${{ env.TESTRAIL_PROJECT_NAME }}"
          --username "${{ env.TESTRAIL_USERNAME }}"
          --key "${{ env.TESTRAIL_API_KEY }}"
          parse_junit
          --suite-id ${{ env.TESTRAIL_SUITE_ID }}
          --title "GitHub Actions - ${{ github.ref_name }} - run ${{ github.run_number }}"
          -f test-results/junit/results.xml